<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculadora Maquineta</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      background:#0f172a;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      padding:20px;
    }

    .card{
      background:#1e293b;
      width:100%;
      max-width:420px;
      border-radius:18px;
      padding:25px;
      box-shadow:0 0 20px rgba(0,0,0,0.4);
    }

    h1{
      text-align:center;
      margin-bottom:20px;
      color:#38bdf8;
    }

    label{
      display:block;
      margin-top:15px;
      margin-bottom:5px;
      font-size:14px;
    }

    input, select{
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      outline:none;
      font-size:16px;
    }

    button{
      width:100%;
      margin-top:20px;
      padding:14px;
      border:none;
      border-radius:10px;
      background:#38bdf8;
      color:#000;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
      transition:0.2s;
    }

    button:hover{
      opacity:0.9;
    }

    .resultado{
      margin-top:25px;
      background:#0f172a;
      padding:18px;
      border-radius:12px;
    }

    .resultado p{
      margin:8px 0;
      font-size:16px;
    }

    .valor{
      color:#4ade80;
      font-weight:bold;
    }
  </style>
</head>
<body>

  <div class="card">

    <h1>💳 Calculadora Maquineta</h1>

    <label>Valor da venda</label>
    <input type="number" id="valor" placeholder="Ex: 1000">

    <label>Forma de pagamento</label>
    <select id="parcelas">
      <option value="debito">Débito</option>
      <option value="1">1x</option>
      <option value="2">2x</option>
      <option value="3">3x</option>
      <option value="4">4x</option>
      <option value="5">5x</option>
      <option value="6">6x</option>
      <option value="7">7x</option>
      <option value="8">8x</option>
      <option value="9">9x</option>
      <option value="10">10x</option>
      <option value="11">11x</option>
      <option value="12">12x</option>
      <option value="13">13x</option>
      <option value="14">14x</option>
      <option value="15">15x</option>
      <option value="16">16x</option>
      <option value="17">17x</option>
      <option value="18">18x</option>
      <option value="19">19x</option>
      <option value="20">20x</option>
      <option value="21">21x</option>
    </select>

    <button onclick="calcular()">
      Calcular
    </button>

    <div class="resultado" id="resultado">

      <p>Valor líquido: <span class="valor">R$ 0,00</span></p>

    </div>

  </div>

  <script>

    const taxas = {
      debito: 0.76,
      1: 3.24,
      2: 4.18,
      3: 4.83,
      4: 5.48,
      5: 6.13,
      6: 6.78,
      7: 7.76,
      8: 8.41,
      9: 9.06,
      10: 9.71,
      11: 10.36,
      12: 11.01,
      13: 11.66,
      14: 12.31,
      15: 12.96,
      16: 13.61,
      17: 14.26,
      18: 14.91,
      19: 15.56,
      20: 16.21,
      21: 16.86
    };

    function calcular(){

      const valor = Number(document.getElementById("valor").value);
      const parcela = document.getElementById("parcelas").value;

      if(!valor){
        alert("Digite um valor");
        return;
      }

      const taxa = taxas[parcela];

      const desconto = valor * (taxa / 100);

      const liquido = valor - desconto;

      document.getElementById("resultado").innerHTML = `
        <p>💰 Valor da venda: <span class="valor">
          R$ ${valor.toFixed(2)}
        </span></p>

        <p>📉 Taxa aplicada: <span class="valor">
          ${taxa}%
        </span></p>

        <p>🏦 Desconto: <span class="valor">
          R$ ${desconto.toFixed(2)}
        </span></p>

        <p>✅ Valor líquido: <span class="valor">
          R$ ${liquido.toFixed(2)}
        </span></p>
      `;
    }

  </script>

</body>
</html>
